<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="סאצ'י ראמן וסושי — מסעדת ראמן וסושי בדיזנגוף 98 תל אביב. גלם טרי, משלוחים ב-Wolt, שעות פתיחה ויצירת קשר."
    />
    <meta
      name="keywords"
      content="סאצ'י, סאצי, ראמן תל אביב, סושי תל אביב, מסעדה דיזנגוף, דיזנגוף 98, ראמן יפני, סושי טרי, Sachi Ramen, Sushi Tel Aviv"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Sachi Ramen &amp; Sushi" />
    <meta name="theme-color" content="#f5f1e6" />
    <meta name="geo.region" content="IL-TA" />
    <meta name="geo.placename" content="תל אביב-יפו" />
    <title>סאצ'י ראמן וסושי · Sachi Ramen &amp; Sushi · דיזנגוף תל אביב</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Heebo:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" as="image" href="/hero-bg.jpg" />
    <link rel="preload" as="image" href="/logo-sachi.webp" type="image/webp" />
    <!-- GA4: סקריפטי gtag נוספים ל-head בזמן build כשהוגדר VITE_GA_MEASUREMENT_ID (ראו vite.config.js) -->
    <style>
      /* Page loader — critical; mirrors global.css until bundle CSS loads */
      .loader {
        position: fixed;
        inset: 0;
        background: #f5f1e6;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s ease;
      }
      .loader-logo {
        width: 90px;
        max-width: 25vw;
        height: auto;
        animation: logoFloat 2.2s ease-in-out infinite alternate;
      }
      @keyframes logoFloat {
        from {
          transform: translateY(0) scale(0.97);
          opacity: 0.82;
        }
        to {
          transform: translateY(-4px) scale(1);
          opacity: 1;
        }
      }
      .loader.hide {
        opacity: 0;
        pointer-events: none;
      }
      @media (min-width: 768px) {
        .loader-logo {
          width: 110px;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="page-loader"
      class="loader"
      role="status"
      aria-live="polite"
      aria-busy="true"
      aria-label="טוען"
    >
      <img
        class="loader-logo"
        src="/logo-sachi.webp"
        alt="לוגו Sachi Ramen &amp; Sushi — טוען"
        width="120"
        height="120"
        fetchpriority="high"
        decoding="async"
        loading="eager"
      />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
